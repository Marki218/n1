<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About 1 PAG-ASA</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* BODY BACKGROUND */
body {
    background-color: #000000; /* Deep Black */
    color: #ffffff;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* HERO SECTION */
.hero {
    /* Changed gradient to a Red-to-Black overlay */
    background: linear-gradient(rgba(139, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url("poster1.jpg");
    background-size: cover;
    background-position: center;
    height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    flex-direction: column;
    border-bottom: 3px solid #ff0000; /* Red accent line */
}

.hero h1 {
    font-size: 3rem;
    font-weight: bold;
    text-transform: uppercase;
    text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
}

.hero p {
    font-size: 1.2rem;
}

/* INFO BOXES */
.info-box {
    background: #1a1a1a; /* Dark Grey/Black */
    color: white;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(255, 0, 0, 0.1); /* Subtle Red glow */
    transition: transform 0.3s, box-shadow 0.3s;
    border: 1px solid #333;
}

.info-box:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(255, 0, 0, 0.3);
    border-color: #ff0000; /* Glows red on hover */
}

.section-title {
    font-weight: 700;
    margin-bottom: 20px;
    color: #ff0000; /* Bright Red Title */
}

/* FOOTER */
.footer {
    background: #000000;
    color: #ffffff;
    text-align: center;
    padding: 25px 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border-top: 1px solid #440000;
}

.footer img {
    height: 60px;
    width: auto;
    filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5));
}

.footer p {
    margin: 0;
    font-size: 0.95rem;
    color: #cccccc;
}

@media(min-width:768px){
    .footer {
        flex-direction: row;
        justify-content: center;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->


<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="pfp.jpg" alt="Logo" style="height:40px; border-radius: 50%; margin-right:10px;">
            1 PAG-ASA
        </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link text-white" href="index.html">Home</a>
        </li>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="container" data-aos="fade-up">
    <h1>About 1 PAG-ASA</h1>
    <p>Promoting Kidney Awareness & Preventive Health Campaigns</p>
    <a href="#about" class="btn btn-warning">Learn More</a>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="py-5">
  <div class="container text-center"> <div class="info-box mb-5" data-aos="fade-up">
      <h2>Our Goals</h2>
      <p>Raising awareness of chronic kidney disease and promoting preventive measures to delay dialysis.</p>
    </div>

    <div class="row justify-content-center"> <div class="col-12 col-md-10 col-lg-8" data-aos="zoom-in"> 
        <div class="campaign-card shadow">
          <img src="goals.jpg" alt="Campaign Goals" class="img-fluid rounded-3 w-100">
        </div>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <img src="pfp.jpg" style="height:40px;margin-bottom:10px;">
  <p>© 2026 1 PAG-ASA | Kidney Awareness Campaign</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ duration: 1000, once: true });
</script>

</body>
</html>
