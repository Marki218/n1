<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Emergency Awareness</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff416c, #ff4b2b, #ff7e5f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        /* FLOATING PARTICLES */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 50px 50px;
            animation: particles 20s linear infinite;
            pointer-events: none;
        }

        @keyframes particles {
            from { transform: translate(0, 0); }
            to { transform: translate(-100px, -100px); }
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 25px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ALERT BAR */
        .alert-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #d90429;
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px 30px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .alert-bar img {
            height: 32px;
            width: 32px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        /* RADAR SCANNER */
        .radar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(217, 4, 41, 0.2);
            margin: 10px auto 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar::before {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border-top: 3px solid #d90429;
            animation: rotate 1.5s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .heartbeat-icon {
            font-size: 2.5rem;
            color: #d90429;
            animation: beat 0.8s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #2b2d42;
            margin: 10px 0;
            letter-spacing: -1px;
        }

        p { color: #8d99ae; font-size: 0.95rem; margin-bottom: 20px; }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .grid div {
            background: #edf2f4;
            color: #2b2d42;
            padding: 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .grid div:hover {
            background: #d90429;
            color: white;
            transform: translateY(-3px);
        }

        /* TIMELINE */
        .timeline {
            text-align: left;
            margin: 25px 0;
            padding-left: 10px;
        }

        .timeline-item {
            margin: 12px 0;
            padding-left: 30px;
            position: relative;
            font-weight: 600;
            color: #4a4e69;
            font-size: 0.9rem;
        }

        .timeline-item::before {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 0;
            color: #d90429;
        }

        /* CTA BUTTON */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #d90429;
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(217, 4, 41, 0.3);
        }

        .cta-button:hover {
            background: #ef233c;
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(217, 4, 41, 0.5);
        }

        @media (max-width: 400px) {
            h1 { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div class="card">
        <!-- Integrated Alert Bar -->
        <div class="alert-bar">
            <span><i class="fas fa-running"></i> URGENT AWARENESS</span>
            <a href="index.html#gallery">
                <img src="pfp.jpg" alt="User" onerror="this.src='https://ui-avatars.com/api/?name=User&background=d90429&color=fff'">
            </a>
        </div>

        <div class="radar">
            <div class="heartbeat-icon">
                <i class="fas fa-heartbeat"></i>
            </div>
        </div>

        <h1>MOVE 10 MINUTES</h1>
        <p>A little movement goes a long way for kidney health.</p>

        <!-- BENEFITS -->
        <div class="grid">
            <div>🚶 Circulation</div>
            <div>💓 Lower BP</div>
            <div>🧂 Less Salt</div>
            <div>🛡️ Protection</div>
        </div>

        <!-- TIMELINE -->
        <div class="timeline">
            <div class="timeline-item">Check Blood Pressure</div>
            <div class="timeline-item">Schedule Urine Test</div>
            <div class="timeline-item">Consult a Specialist</div>
        </div>

        <div class="cta-section">
            <a href="index.html" class="cta-button">
                <i class="fas fa-arrow-left"></i> Back to Main Page
            </a>
        </div>
    </div>

</body>
</html>
