<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Alert: Too Much Sitting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #007cf0, #ff6a00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        /* FLOATING PARTICLES */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
            background-size: 60px 60px;
            animation: particles 15s linear infinite;
            pointer-events: none;
        }

        @keyframes particles {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 65px 25px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* ALERT HEADER */
        .alert-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #ff3b3b;
            color: white;
            padding: 12px 20px;
            border-radius: 30px 30px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .alert-header img {
            height: 35px;
            width: 35px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            transition: 0.3s;
        }

        .alert-header img:hover { transform: scale(1.1); }

        /* RADAR SCANNER */
        .radar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(255, 59, 59, 0.1);
            margin: 10px auto 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar::before {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border-top: 3px solid #ff3b3b;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .heartbeat {
            font-size: 2.8rem;
            color: #ff3b3b;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 900;
            color: #0033a0;
            margin: 5px 0;
            line-height: 1.1;
        }

        p { color: #555; font-size: 0.95rem; margin-bottom: 20px; }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .grid div {
            background: linear-gradient(45deg, #007cf0, #00dfd8);
            color: white;
            padding: 15px 10px;
            border-radius: 18px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 124, 240, 0.2);
            transition: 0.3s;
        }

        .grid div:nth-child(even) { background: linear-gradient(45deg, #ff6a00, #ee0979); }

        /* TIMELINE */
        .timeline {
            text-align: left;
            margin: 25px 0;
            padding: 0 10px;
        }

        .timeline div {
            margin: 12px 0;
            padding-left: 35px;
            position: relative;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .timeline div::before {
            content: "\f110";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 0;
            color: #ff3b3b;
            animation: fa-spin 2s linear infinite;
        }

        /* BUTTON */
        .cta-button {
            background: #ff3b3b;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255, 59, 59, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 59, 59, 0.5);
            background: #e63030;
        }

        @media (max-width: 400px) {
            h1 { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="alert-header">
            <span><i class="fas fa-exclamation-triangle"></i> Action Required</span>
            <a href="index.html#gallery">
                <img src="pfp.jpg" alt="Profile" onerror="this.src='https://ui-avatars.com/api/?name=User&background=ff3b3b&color=fff'">
            </a>
        </div>

        <div class="radar">
            <div class="heartbeat">
                <i class="fas fa-heartbeat"></i>
            </div>
        </div>

        <h1>TOO MUCH SITTING</h1>
        <p>Sedentary behavior slows kidney filtration. Move now!</p>

        <div class="grid">
            <div>🚶 Boost Flow</div>
            <div>💓 Lower BP</div>
            <div>🧂 Flush Salts</div>
            <div>🛡️ Protect Cells</div>
        </div>

        <div class="timeline">
            <div>Step 1: Stand & Stretch</div>
            <div>Step 2: Light Walking</div>
            <div>Step 3: Hydrate & Track</div>
        </div>

        <a href="index.html" class="cta-button">Move 10 Minutes Now</a>
    </div>

</body>
</html>
