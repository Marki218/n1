<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Founding Fathers - 1 PAG-ASA</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- GLightbox -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />

  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* HERO SECTION */
    .hero {
      background: linear-gradient(rgba(139, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url("poster1.jpg");
      background-size: cover;
      background-position: center;
      height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      flex-direction: column;
      border-bottom: 4px solid #ff0000;
    }

    .hero h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 800;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
    }

    /* FOUNDERS SECTION */
    .section-title {
      color: #ff0000;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .founder-card {
      background: #111;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 30px;
      transition: all 0.4s ease;
      height: 100%;
      text-align: center;
    }

    .founder-card:hover {
      border-color: #ff0000;
      transform: translateY(-10px);
      box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
    }

    .founder-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid #ff0000;
      padding: 5px;
    }

    .founder-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .founder-role {
      color: #ff0000;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.9rem;
      margin-bottom: 15px;
      display: block;
    }

    .founder-bio {
      font-size: 0.95rem;
      color: #ccc;
      line-height: 1.6;
    }

    /* IMAGE ZOOM CONTAINER */
    .campaign-container {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      border: 2px solid #333;
      cursor: zoom-in;
    }

    .zoom-hint {
      position: absolute;
      bottom: 15px;
      right: 15px;
      background: rgba(255, 0, 0, 0.8);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    /* FOOTER */
    .footer {
      background: #000000;
      padding: 40px 15px;
      border-top: 1px solid #222;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top" style="background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="pfp.jpg" alt="Logo" style="height:40px; border-radius: 50%; margin-right:10px; border: 1px solid #ff0000;">
        1 PAG-ASA
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active text-white" style="border-bottom: 2px solid #ff0000;">Founders</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="container" data-aos="fade-up">
      <h1>The Founding Fathers</h1>
      <p class="lead">The Visionaries Behind 1 PAG-ASA Kidney Awareness</p>
    </div>
  </section>


  <!-- HISTORICAL PHOTO / DOCUMENT (Zoomable) -->
  <section class="py-5" style="background: #0a0a0a;">
    <div class="container text-center">
      <h2 class="section-title" data-aos="fade-up">The Legacy Charter</h2>
      <div class="row justify-content-center">
        <div class="col-lg-8" data-aos="zoom-in">
          <a href="ORG.jpg" class="glightbox">
            <div class="campaign-container shadow">
              <img src="ORG.jpg" alt="Founding Document" class="img-fluid w-100">
              <div class="zoom-hint"><i class="fa-solid fa-magnifying-glass-plus"></i> View Full Charter</div>
            </div>
          </a>
          <p class="mt-4 text-muted fst-italic">Above: The original mission statement drafted during the first 1 PAG-ASA assembly.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <img src="pfp.jpg" alt="Logo" style="height:50px; border-radius: 50%; margin-bottom:15px; border: 1px solid #ff0000;">
      <p>© 2026 1 PAG-ASA | Honoring our Roots</p>
    </div>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  
  <script>
    AOS.init({ duration: 1000, once: true });
    const lightbox = GLightbox({ selector: '.glightbox', zoomable: true });
  </script>

</body>
</html>
