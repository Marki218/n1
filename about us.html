<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>About 1 PAG-ASA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            /* Changed from solid red to a soft gradient for better readability */
            background: linear-gradient(135deg, #f80000 0%, #00ff44 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, #dc3545, #c62828);
            font-weight: bold;
        }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("poster1.jpg");
            background-size: cover;
            background-position: center;
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(255, 255, 255); /* Changed from black to white for contrast */
            text-align: center;
        }

        /* SECTION BOX */
        .info-box {
            background: rgb(243, 1, 1); /* Changed to white to pop against the background */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* GALLERY */
        .gallery-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s ease-in-out;
            cursor: pointer;
            border: 1px solid #000000;
        }

        .gallery-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .gallery-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .caption {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            color: #000000;
        }

        /* FOOTER */
        .footer {
             background: linear-gradient(135deg, #000000 0%, #000000 100%);
            color: rgb(250, 0, 0);
            text-align: center;
            padding: 30px 0;
        }

        /* MODAL IMAGE */
        .modal-img {
            width: 100%;
            border-radius: 10px;
        }
        
        .modal-content {
            border-radius: 15px;
            border: none;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="campaign.html">
            <img src="pfp.jpg" alt="Logo" style="height:40px; border-radius: 50%; margin-right:10px;">
            1 PAG-ASA
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="container">
        <h1 class="display-3 fw-bold" data-aos="fade-up">About Us</h1>
        <p class="lead" data-aos="fade-up" data-aos-delay="200">Our journey in Kidney Awareness & Community Support</p>
    </div>
</section>

<section class="container my-5">
    <div class="info-box" data-aos="fade-up">
        <h3 class="text-success fw-bold mb-5 text-center" data-aos="zoom-in">Our Activities</h3>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="gallery-card" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage('ABOUT US.jpg')">
                    <img src="ABOUT US.jpg" alt="Community">
                    <div class="caption">Community Awareness</div>
                </div>
            </div>

            <div class="col-md-4" data-aos-delay="100">
                <div class="gallery-card" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage('ckd.jpg')">
                    <img src="ckd.jpg" alt="Education">
                    <div class="caption">CKD Education Program</div>
                </div>
            </div>

            <div class="col-md-4" data-aos-delay="200">
                <div class="gallery-card" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage('ckd2.jpg')">
                    <img src="ckd2.jpg" alt="Support">
                    <div class="caption">Patient Support Activities</div>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header border-0">
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center p-0">
        <img id="modalImage" class="modal-img" src="">
      </div>
      <div class="modal-footer border-0"></div>
    </div>
  </div>
</div>

<footer class="footer">
    <div class="container text-center">
        <div class="d-flex justify-content-center align-items-center mb-3">
            <img src="pfp.jpg" alt="Logo" style="height:40px; border-radius: 50%; margin-right:10px;">
            <span class="fs-5 fw-bold">1 PAG-ASA</span>
        </div>
        <p class="text-secondary">© 2026 1 PAG-ASA | Kidney Awareness Campaign</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init({
        duration: 800,
        once: true
    });

    function showImage(src){
        document.getElementById("modalImage").src = src;
    }
</script>

</body>
</html>
