<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Awareness Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #00c6ff;
            --secondary: #0077b6;
            --dark: #0f2027;
            --danger: #ff4b2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2c5364 0%, #0f2027 100%);
            overflow: hidden;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 80px 30px 40px; /* Increased top padding */
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .alert-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .back-link {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-link:hover { opacity: 0.8; transform: translateX(-3px); }

        .profile-img {
            height: 40px;
            width: 40px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.5);
            object-fit: cover;
            transform: rotate(-5deg);
            transition: 0.3s;
        }

        .profile-img:hover { transform: rotate(0deg) scale(1.1); }

        .monitor-box {
            width: 130px;
            height: 130px;
            background: #000;
            border-radius: 50%;
            margin: 0 auto 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #333;
            box-shadow: inset 0 0 20px var(--primary);
        }

        .monitor-box::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-linear-gradient(rgba(0,198,255,0.05) 0px, rgba(0,198,255,0.05) 1px, transparent 1px, transparent 10px);
        }

        .radar-sweep {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border-top: 2px solid var(--primary);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate { to { transform: rotate(360deg); } }

        .icon {
            font-size: 3rem;
            color: var(--primary);
            z-index: 2;
            filter: drop-shadow(0 0 10px var(--primary));
            animation: heart-pulse 1.5s ease-in-out infinite;
        }

        @keyframes heart-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        h1 { 
            font-size: 1.6rem; 
            color: var(--dark); 
            font-weight: 900; 
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        
        .status-tag {
            display: inline-block;
            background: var(--danger);
            color: white;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .chip {
            background: rgba(0, 119, 182, 0.05);
            border: 1px solid rgba(0, 119, 182, 0.1);
            padding: 15px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--secondary);
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: 0.3s;
            cursor: default;
        }

        .chip i { font-size: 1.2rem; color: var(--primary); }
        .chip:hover { background: var(--secondary); color: white; transform: translateY(-5px); }
        .chip:hover i { color: white; }

        .upgrade-btn {
            background: var(--dark);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .upgrade-btn::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -100%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .upgrade-btn:hover {
            background: var(--secondary);
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,119,182,0.3);
        }

        @media (max-width: 400px) {
            .data-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="card">
        <header class="alert-header">
            <a href="index.html#gallery" class="back-link">
                <i class="fas fa-arrow-left"></i> BACK
            </a>
            <span>LIVE DIAGNOSTIC</span>
            <a href="index.html#home">
                <img src="pfp.jpg" alt="Logo" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=K&background=0077b6&color=fff'">
            </a>
        </header>

        <div class="monitor-box">
            <div class="radar-sweep"></div>
            <div class="icon"><i class="fas fa-wave-square"></i></div>
        </div>

        <h1>BODY SIGNALS<br>MONITOR</h1>
        <div class="status-tag">Risk: Sedentary Lifestyle</div>
        
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">
            Extended sitting detected. Renal filtration speed decreasing.
        </p>

        <div class="data-grid">
            <div class="chip">
                <i class="fas fa-walking"></i>
                <span>Circulation</span>
            </div>
            <div class="chip">
                <i class="fas fa-tint"></i>
                <span>Hydration</span>
            </div>
            <div class="chip">
                <i class="fas fa-shield-virus"></i>
                <span>Immunity</span>
            </div>
            <div class="chip">
                <i class="fas fa-bolt"></i>
                <span>Filtration</span>
            </div>
        </div>

        <button class="upgrade-btn" onclick="alert('Activation successful! Stand up and move for 2 minutes.')">
            Initialize Awareness
        </button>
    </div>

</body>
</html>
