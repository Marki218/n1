<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>1 PAG-ASA | Kidney Awareness Recognition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-red: #d32f2f;
            --primary-green: #2e7d32;
            --soft-bg: #f8f9fa;
        }

        body {
            background: var(--soft-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #2d3436;
        }

        /* Navbar */
        .navbar {
            background: rgba(148, 34, 34, 0.95) !important;
            backdrop-filter: blur(12px);
            border-bottom: 3px solid var(--primary-green);
        }

        /* Gallery Cards Upgrade */
        .cert-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .cert-img-container {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        .cert-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .cert-card:hover .cert-img {
            transform: scale(1.1);
        }

        /* View Overlay */
        .cert-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }

        .cert-card:hover .cert-overlay {
            opacity: 1;
        }

        /* Modal Upgrades */
        .modal-content {
            background: #1a1a1a;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-body {
            position: relative;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Important for Panning */
            background: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            cursor: grab;
        }

        .modal-body:active { cursor: grabbing; }

        #modalImage {
            max-height: 100%;
            max-width: 100%;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            pointer-events: none; /* Let the container handle mouse events */
        }

        /* Controls Style */
        .btn-control {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            transition: 0.2s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-control:hover {
            background: var(--primary-red);
            border-color: var(--primary-red);
            color: white;
        }

        .image-counter {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .footer {
            background: linear-gradient(135deg, #942222, #1b4d1e);
            color: #fff;
            padding: 4rem 0;
            margin-top: 5rem;
            clip-path: ellipse(150% 100% at 50% 100%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery-item {
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg shadow-sm" style="background: linear-gradient(90deg, #dc3545, #e53935);">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html" style="text-decoration:none; color:white;">
                <img src="pfp.jpg" alt="1 PAG-ASA Logo" style="height:40px; width:auto; margin-right:10px;">
                1 PAG-ASA
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item d-flex align-items-center">
                        <!-- Updated house icon: larger size and pointing to campaign.html -->
                        <a class="nav-link text-white" href="campaign.html"> 
                            <div class="info-icon"><i class="bi bi-house" style="font-size: 2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'"></i></div>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <div class="text-center mb-5">
            <h6 class="text-uppercase text-danger fw-bold mb-2" style="letter-spacing: 3px;">Recognition</h6>
            <h2 class="display-5 fw-bold">Our Impact & Certificates</h2>
            <p class="text-muted">Review our certified contributions to public health.</p>
            <div class="mx-auto mt-3" style="width:60px;height:4px;background:var(--primary-green);border-radius:2px;"></div>
        </div>

        <div class="row g-4" id="galleryGrid"></div>
    </section>

    <!-- View Modal -->
    <div class="modal fade" id="certModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <div class="image-counter" id="imageCounter"></div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                
                <div class="modal-body" id="zoomContainer">
                    <img id="modalImage" src="" alt="Certificate Preview">
                </div>

                <div class="modal-footer border-0 justify-content-between p-4">
                    <button class="btn btn-control rounded-circle" id="prevBtn"><i class="bi bi-chevron-left"></i></button>
                    
                    <div class="d-flex gap-2">
                        <button class="btn btn-control rounded-pill px-4" id="zoomOut"><i class="bi bi-dash-lg"></i></button>
                        <button class="btn btn-control rounded-pill px-4" id="zoomIn"><i class="bi bi-plus-lg"></i></button>
                        <button class="btn btn-control rounded-pill px-4" id="resetZoom" title="Reset View"><i class="bi bi-arrow-counterclockwise"></i></button>
                    </div>

                    <button class="btn btn-control rounded-circle" id="nextBtn"><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <img src="pfp.jpg" alt="Logo" style="height:60px; border-radius:50%; border: 2px solid white; margin-bottom:12px;"> 
            <p class="opacity-75">Together for Kidney Health Awareness</p>
            <p class="small mt-4 opacity-50">© 2026 1 PAG-ASA | Recognition Gallery</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const images = ['cert.jpg', 'cert2.jpg', 'cert3.jpg', 'cert4.jpg', 'cert5.jpg', 'cert6.jpg', 'cert7.jpg'];
        let currentIndex = 0;
        let scale = 1;
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;

        const grid = document.getElementById('galleryGrid');
        const modalImage = document.getElementById('modalImage');
        const zoomContainer = document.getElementById('zoomContainer');
        const counter = document.getElementById('imageCounter');
        const bModal = new bootstrap.Modal(document.getElementById('certModal'));

        // Populate Grid
        images.forEach((src, index) => {
            const col = document.createElement('div');
            col.className = 'col-md-4 col-lg-3 gallery-item';
            col.style.animationDelay = `${index * 0.05}s`;
            col.innerHTML = `
                <div class='cert-card' onclick="openLightbox(${index})">
                    <div class="cert-img-container">
                        <img src='${src}' class='cert-img' alt='Certificate ${index + 1}' loading="lazy">
                        <div class="cert-overlay">
                            <span class="btn btn-light btn-sm rounded-pill fw-bold">View Certificate</span>
                        </div>
                    </div>
                </div>`;
            grid.appendChild(col);
        });

        function openLightbox(index) {
            currentIndex = index;
            resetZoomState();
            updateModal();
            bModal.show();
        }

        function updateModal() {
            modalImage.style.opacity = '0';
            setTimeout(() => {
                modalImage.src = images[currentIndex];
                counter.innerText = `${currentIndex + 1} / ${images.length}`;
                modalImage.style.opacity = '1';
            }, 200);
        }

        function resetZoomState() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            applyTransform();
        }

        function applyTransform() {
            modalImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // Controls
        document.getElementById('nextBtn').onclick = () => { currentIndex = (currentIndex + 1) % images.length; resetZoomState(); updateModal(); };
        document.getElementById('prevBtn').onclick = () => { currentIndex = (currentIndex - 1 + images.length) % images.length; resetZoomState(); updateModal(); };
        
        document.getElementById('zoomIn').onclick = () => { if(scale < 4) scale += 0.4; applyTransform(); };
        document.getElementById('zoomOut').onclick = () => { if(scale > 0.8) scale -= 0.4; applyTransform(); };
        document.getElementById('resetZoom').onclick = () => resetZoomState();

        // Panning Logic
        zoomContainer.addEventListener('mousedown', e => {
            if (scale <= 1) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            applyTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // Keyboard support
        document.addEventListener('keydown', e => {
            const isShown = document.getElementById('certModal').classList.contains('show');
            if (!isShown) return;
            if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
            if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
            if (e.key === 'Escape') bModal.hide();
        });
    </script>
</body>
</html>
