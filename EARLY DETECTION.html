<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early Detection - Kidney Health Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #ff4757;
            --warning: #feca57;
            --info: #48dbfb;
            --dark: #2f3542;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ff9ff3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: bgFloat 20s linear infinite;
            opacity: 0.4;
        }

        @keyframes bgFloat {
            from { background-position: 0 0; }
            to { background-position: 0 -1000px; }
        }

        .early-detection-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px 40px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        /* Top Warning Bar */
        .alert-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
            z-index: 10;
        }

        .alert-header img {
            height: 30px;
            width: 30px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .early-detection-card:hover {
            transform: translateY(-10px) scale(1.02);
        }

        /* Radar Scanner Effect */
        .radar-scanner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            border: 2px solid rgba(72, 219, 251, 0.2);
            border-radius: 50%;
            animation: radarRotate 6s linear infinite;
            pointer-events: none;
        }

        @keyframes radarRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .main-icon {
            font-size: 4.5rem;
            background: linear-gradient(45deg, var(--accent), var(--warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
        }

        .card-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 10px;
            line-height: 1;
        }

        .card-subtitle {
            font-size: 1rem;
            font-weight: 700;
            color: #666;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Detection Timeline */
        .timeline {
            display: flex;
            justify-content: space-between;
            margin: 40px 0;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 10%;
            right: 10%;
            height: 3px;
            background: #eee;
            z-index: 1;
        }

        .timeline-point {
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
            border: 3px solid var(--accent);
            transition: 0.3s;
        }

        .timeline-point span {
            position: absolute;
            bottom: -25px;
            font-size: 0.65rem;
            white-space: nowrap;
            color: #888;
        }

        /* Screening Benefits */
        .benefits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .benefit-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #f0f0f0;
            transition: 0.3s;
        }

        .benefit-card i {
            color: var(--accent);
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .benefit-text {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--dark);
        }

        /* Action Button */
        .urgent-cta {
            background: linear-gradient(45deg, var(--accent), #ff6b81);
            color: white !important;
            padding: 18px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            transition: 0.3s;
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.3);
        }

        .urgent-cta:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 71, 87, 0.5);
        }

        @media (max-width: 400px) {
            .card-title { font-size: 1.8rem; }
            .benefits-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="early-detection-card">
        <div class="radar-scanner"></div>
        
        <div class="alert-header">
            <span><i class="fas fa-exclamation-circle"></i> PRIORITY ACTION</span>
            <a href="index.html#gallery">
                <img src="pfp.jpg" alt="Profile" onerror="this.src='https://ui-avatars.com/api/?name=K&background=ff4757&color=fff'">
            </a>
        </div>
        
        <div class="main-icon">
            <i class="fas fa-stethoscope"></i>
        </div>
        
        <h1 class="card-title">EARLY DETECTION</h1>
        <p class="card-subtitle">Regular Screening Saves Lives</p>
        
        <div class="timeline">
            <div class="timeline-point">1 <span>Blood Test</span></div>
            <div class="timeline-point">2 <span>Urine Test</span></div>
            <div class="timeline-point">3 <span>BP Check</span></div>
        </div>
        
        <div class="benefits-grid">
            <div class="benefit-card">
                <i class="fas fa-shield-alt"></i>
                <div class="benefit-text">90% Success</div>
            </div>
            <div class="benefit-card">
                <i class="fas fa-clock"></i>
                <div class="benefit-text">Fast Results</div>
            </div>
            <div class="benefit-card">
                <i class="fas fa-heart"></i>
                <div class="benefit-text">Save Kidneys</div>
            </div>
            <div class="benefit-card">
                <i class="fas fa-wallet"></i>
                <div class="benefit-text">Low Cost</div>
            </div>
        </div>
        
        <a href="index.html" class="urgent-cta">
            <i class="fas fa-arrow-left"></i> Return to Main
        </a>
    </div>
</body>
</html>
