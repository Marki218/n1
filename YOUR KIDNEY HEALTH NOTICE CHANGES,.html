<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidney Awareness Campaign</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    overflow:hidden;
}

/* ⭐ FLOATING PARTICLES */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
    background-size:50px 50px;
    animation:move 20s linear infinite;
}
@keyframes move{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

/* CARD */
.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.95);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 25px 70px rgba(0,0,0,0.4);
    position:relative;
}

/* ⚠️ ALERT BADGE */
.alert{
    position:absolute;
    top:-15px;
    left:50%;
    transform:translateX(-50%);
    background:#ffcc00;
    padding:8px 25px;
    border-radius:50px;
    font-weight:bold;
    animation:pulse 1s infinite;
}
@keyframes pulse{
    0%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.1);}
    100%{transform:translateX(-50%) scale(1);}
}

/* 📡 RADAR */
.radar{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid rgba(0,0,0,0.1);
    margin:20px auto;
    position:relative;
}
.radar::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    border-top:4px solid #ff4b2b;
    animation:rotate 2s linear infinite;
}
@keyframes rotate{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}

/* 💓 HEARTBEAT ICON */
.icon{
    font-size:3rem;
    color:#ff416c;
    animation:beat 1s infinite;
}
@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

/* TEXT */
h1{
    font-size:1.8rem;
    color:#b00020;
    margin-top:10px;
}
.subtitle{
    font-weight:bold;
    margin-top:5px;
}
.warning{
    color:#d90429;
    font-weight:bold;
    margin:10px 0;
}

/* 🎯 BENEFITS GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin:20px 0;
}
.grid div{
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:#fff;
    padding:10px;
    border-radius:12px;
    font-size:0.85rem;
    font-weight:bold;
}

/* 📊 TIMELINE */
.timeline{
    text-align:left;
    margin:15px 0;
}
.timeline div{
    margin:8px 0;
    padding-left:20px;
    position:relative;
}
.timeline div::before{
    content:"";
    position:absolute;
    left:0;
    top:6px;
    width:10px;
    height:10px;
    background:#ff4b2b;
    border-radius:50%;
}

/* BUTTON */
button{
    background:#ff416c;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:50px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.1);
    background:#b00020;
}

/* 📱 MOBILE */
@media(max-width:480px){
    h1{font-size:1.5rem;}
}
</style>
</head>

<body>

<div class="card">

<div class="alert">⚠️ ACT NOW!
    <a class="navbar-brand d-flex align-items-center" href="index.html" style="text-decoration:none; color:white; margin-left:10px;">
       <img src="pfp.jpg" alt="Logo" style="height:40px; border-radius: 50%; margin-right:10px;">
        </a>
</div>


<div class="radar"></div>

<div class="icon"><i class="fas fa-stethoscope"></i></div>

<!-- 🔥 YOUR FINAL TEXT -->
<h1>YOUR KIDNEY HEALTH</h1>
<p class="subtitle">NOTICE CHANGES, ACT EARLY</p>
<p class="warning">RECOGNIZE THE SIGNS AND TAKE ACTION</p>

<!-- 🎯 BENEFITS -->
<div class="grid">
<div>🚶 Boost Circulation</div>
<div>💓 Reduce BP</div>
<div>🧂 Lower Salt Impact</div>
<div>🛡️ Protect Kidneys</div>
</div>

<!-- 📊 TIMELINE -->
<div class="timeline">
<div>Step 1: Notice Symptoms</div>
<div>Step 2: Get Checked Early</div>
<div>Step 3: Take Preventive Action</div>
</div>

<button onclick="alert('Act now and protect your kidney health!')">Start Awareness</button>

</div>

</body>
</html>
