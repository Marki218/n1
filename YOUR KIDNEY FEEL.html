<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Health Awareness</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --accent: #ff416c;
            --accent-dark: #b00020;
            --warning: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            overflow: hidden;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 50px 50px;
            animation: move-bg 20s linear infinite;
            pointer-events: none;
        }

        @keyframes move-bg {
            from { transform: translate(0, 0); }
            to { transform: translate(-200px, -200px); }
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 80px 25px 35px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            position: relative;
            border: 1px solid rgba(255,255,255,0.4);
            z-index: 1;
        }

        /* UPDATED HEADER WITH BACK ARROW */
        .alert-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: var(--warning);
            color: #000;
            padding: 0 20px;
            height: 60px;
            border-radius: 30px 30px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .back-btn {
            color: #000;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.1);
            transform: translateX(-3px);
        }

        .header-logo {
            height: 38px;
            width: 38px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
            transition: 0.3s;
        }

        .header-logo:hover { transform: scale(1.1); }

        /* SCANNER ANIMATION */
        .radar-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 65, 108, 0.1);
            margin: 0 auto 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-container::after {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border-top: 3px solid #ff4b2b;
            animation: rotate-radar 2s linear infinite;
        }

        @keyframes rotate-radar {
            to { transform: rotate(360deg); }
        }

        .pulse-icon {
            font-size: 2.8rem;
            color: var(--accent);
            animation: beat-effect 1s infinite;
        }

        @keyframes beat-effect {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 { font-size: 1.8rem; color: var(--accent-dark); font-weight: 900; margin-bottom: 5px; }
        .subtitle { font-weight: 700; color: #444; font-size: 0.9rem; letter-spacing: 1px; }
        
        .warning-tag {
            background: rgba(217, 4, 41, 0.1);
            color: #d90429;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 12px;
            display: inline-block;
            margin: 15px 0;
            font-size: 0.8rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .grid-item {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: #fff;
            padding: 12px 8px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.2);
        }

        .action-list {
            text-align: left;
            margin: 20px 0;
            padding: 0 10px;
        }

        .action-item {
            margin: 12px 0;
            padding-left: 30px;
            position: relative;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .action-item::before {
            content: "\f058";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 0;
            color: #ff4b2b;
        }

        .cta-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 18px 30px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(255, 65, 108, 0.3);
        }

        .cta-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-3px);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div class="card">
        <!-- UPDATED HEADER -->
        <header class="alert-header">
            <a href="index.html" class="back-btn" title="Go Back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <span><i class="fas fa-exclamation-circle"></i> Priority Alert</span>
            <a href="profile.html">
                <img src="pfp.jpg" alt="Profile" class="header-logo" onerror="this.src='https://ui-avatars.com/api/?name=K&background=ff416c&color=fff'">
            </a>
        </header>

        <!-- VISUAL SCANNER -->
        <div class="radar-container">
            <div class="pulse-icon"><i class="fas fa-heart-pulse"></i></div>
        </div>

        <h1>KIDNEY VITALITY</h1>
        <p class="subtitle">FUEL YOUR FILTERS RIGHT</p>
        
        <div class="warning-tag">
            ⚠️ STAGNATION = SLOW FILTRATION
        </div>

        <!-- KEY STATS -->
        <div class="grid-container">
            <div class="grid-item">🥗 Whole Foods</div>
            <div class="grid-item">💧 Proper Hydration</div>
            <div class="grid-item">🧂 Reduced Sodium</div>
            <div class="grid-item">🛡️ Cellular Support</div>
        </div>

        <!-- ACTION STEPS -->
        <div class="action-list">
            <div class="action-item">Prioritize Fresh Ingredients</div>
            <div class="action-item">Move for 5 Minutes Every Hour</div>
            <div class="action-item">Monitor Daily Fluid Intake</div>
        </div>

        <button class="cta-btn" onclick="alert('Challenge accepted! Protocol initialized.')">
            Begin Health Protocol
        </button>
    </div>

</body>
</html>
