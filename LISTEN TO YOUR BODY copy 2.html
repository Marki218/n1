<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Awareness Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
            overflow: hidden;
            padding: 20px;
        }

        /* FLOATING PARTICLES */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            animation: move 25s linear infinite;
            pointer-events: none;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(-250px, -250px); }
        }

        /* CARD */
        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 70px 30px 35px; /* Adjusted top padding */
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            position: relative;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* UPDATED ALERT HEADER WITH BACK ARROW */
        .alert-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #0077b6;
            color: white;
            padding: 0 20px;
            height: 60px; /* Set fixed height for vertical centering */
            border-radius: 30px 30px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-3px);
        }

        .header-logo {
            height: 35px;
            width: 35px;
            border-radius: 50%;
            border: 2px solid #00c6ff;
            object-fit: cover;
            transition: 0.3s;
        }

        .header-logo:hover { transform: scale(1.1); }

        /* RADAR SCANNER */
        .radar-box {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(0, 198, 255, 0.1);
            margin: 0 auto 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-box::after {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border-top: 3px solid #00c6ff;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .icon {
            font-size: 2.8rem;
            color: #0077b6;
            animation: beat 1.2s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* TEXT */
        h1 { font-size: 1.8rem; color: #023e8a; font-weight: 900; margin-bottom: 5px; }
        .subtitle { font-weight: 800; color: #0077b6; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .warning-box {
            background: rgba(217, 4, 41, 0.1);
            color: #d90429;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 8px;
            border-radius: 10px;
            margin: 15px 0;
        }

        /* BENEFITS GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .grid div {
            background: linear-gradient(45deg, #0077b6, #00c6ff);
            color: #fff;
            padding: 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: 0.3s;
        }

        .grid div:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 119, 182, 0.3); }

        /* TIMELINE */
        .timeline {
            text-align: left;
            margin: 20px 0;
            padding-left: 5px;
        }

        .timeline div {
            margin: 10px 0;
            padding-left: 30px;
            position: relative;
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .timeline div::before {
            content: "\f058";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 0;
            color: #00c6ff;
        }

        /* BUTTON */
        .cta-btn {
            background: #0077b6;
            color: #fff;
            border: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.2);
        }

        .cta-btn:hover {
            transform: scale(1.03);
            background: #023e8a;
            box-shadow: 0 15px 30px rgba(2, 62, 138, 0.4);
        }

        @media (max-width: 480px) { h1 { font-size: 1.5rem; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>

<body>

    <div class="card">
        <!-- Integrated Header with Back Arrow -->
        <div class="alert-header">
            <a href="index.html" class="back-btn" title="Go Back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <span><i class="fas fa-heart"></i> Wellness Alert</span>
            <a href="index.html#gallery">
                <img src="pfp.jpg" alt="Logo" class="header-logo" onerror="this.src='https://ui-avatars.com/api/?name=K&background=0077b6&color=fff'">
            </a>
        </div>

        <div class="radar-box">
            <div class="icon"><i class="fas fa-stethoscope"></i></div>
        </div>

        <h1>LISTEN TO YOUR BODY</h1>
        <p class="subtitle">Early Detection Saves Lives</p>
        
        <div class="warning-box">
            <i class="fas fa-exclamation-circle"></i> SITTING = Slow Filtration
        </div>

        <!-- BENEFITS -->
        <div class="grid">
            <div>🚶 Boost Circulation</div>
            <div>💓 Stabilize BP</div>
            <div>🧂 Balance Salt</div>
            <div>🛡️ Filter Defense</div>
        </div>

        <!-- TIMELINE -->
        <div class="timeline">
            <div>Step 1: Stand & Stretch Every Hour</div>
            <div>Step 2: 10 Minute Light Walk</div>
            <div>Step 3: Hydrate & Monitor Feeling</div>
        </div>

        <a href="index.html" class="cta-btn">Start Awareness</a>
    </div>

</body>
</html>
