<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>About 1 PAG-ASA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
    font-family: Arial, Helvetica, sans-serif;
}

/* NAVBAR */
.navbar{
    font-weight:bold;
    background: linear-gradient(90deg,#c40000,#ff3b3b);
}

/* HERO */
.hero{
    background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("poster1.jpg");
    background-size:cover;
    background-position:center;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
}

/* ABOUT SECTION */
.about-section{
    background:white;
    padding:60px 20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    position:relative;
    overflow:hidden;
}

/* DECORATIVE CIRCLES */
.about-section::before{
    content:"";
    position:absolute;
    top:-80px;
    left:-80px;
    width:300px;
    height:300px;
    background:#c40000;
    border-radius:50%;
    opacity:0.1;
}

.about-section::after{
    content:"";
    position:absolute;
    bottom:-100px;
    right:-100px;
    width:250px;
    height:250px;
    background:#ff0000;
    border-radius:50%;
    opacity:0.1;
}

/* IMAGE CARD */
.campaign-card img{
    width:100%;
    border-radius:15px;
}

/* FOOTER */
.footer {
    background: #010802;
    color: white;
    text-align: center;
    padding: 25px 15px;
}

.footer img {
    height: 60px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="campaign.html">
            <img src="pfp.jpg" alt="Logo" style="height:40px; border-radius: 50%; margin-right:10px;">
            1 PAG-ASA
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="index.html">Home</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="container">
        <h1 data-aos="fade-up">About 1 PAG-ASA</h1>
        <p data-aos="fade-up" data-aos-delay="200">Kidney Awareness Campaign</p>
    </div>
</section>

<section id="tips" class="py-5 bg-light">
<div class="container">

<h2 class="text-center fw-bold mb-4">OUR MISSION</h2>

<div class="row g-4">

  <!-- VIDEO 1 -->
  <div class="col-md-4">
    <div class="card shadow h-100">
      <div class="ratio ratio-16x9">
        <video controls class="w-100">
          <source src="1 Pag-asa Video Presentation 2025.mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-body text-center">
        <h5>KIDNEY DISEASE WARRIOR</h5>
        <p>GREEN RIBBON</p>
      </div>
    </div>
  </div>

  <!-- VIDEO 2 -->
  <div class="col-md-4">
    <div class="card shadow h-100">
      <div class="ratio ratio-16x9">
        <video controls class="w-100">
          <source src="PPT of 1PAGASA 2026 (2).mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-body text-center">
        <h5>ABOUT</h5>
        <p>1 PAGASA KIDNEY ALAGAAN NATIN</p>
      </div>
    </div>
  </div>

  <!-- VIDEO 3 -->
  <div class="col-md-4">
    <div class="card shadow h-100">
      <div class="ratio ratio-16x9">
        <video controls class="w-100">
          <source src="Medical Mission (2).mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-body text-center">
        <h5>MEDICAL MISSION</h5>
        <p>1 PAGASA KIDNEY ALAGAAN NATIN</p>
      </div>
    </div>
  </div>

</div>

</div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <img src="pfp.jpg">
    <p>© 2026 1 PAG-ASA | Kidney Awareness Campaign</p>
</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
    duration:1000,
    once:true
});
</script>

</body>
</html>
